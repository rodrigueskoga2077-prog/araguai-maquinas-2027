<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Araguaia Máquinas | Alta Performance</title>
    <meta name="description" content="Máquinas de alta performance para o seu negócio.">
    
    <style>
        /* =========================================
           VARIÁVEIS E RESET
           ========================================= */
        :root {
            --bg-color: #0f0f0f;
            --text-light: #f5f5f5;
            --primary-yellow: #FFD700;
            --primary-hover: #e6c200;
            --dark-gray: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            overflow-x: hidden;
        }

        html {
            scroll-behavior: smooth;
        }

        /* =========================================
           LOADER
           ========================================= */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid var(--dark-gray);
            border-top-color: var(--primary-yellow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* =========================================
           CABEÇALHO E LOGO
           ========================================= */
        .header {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            max-height: 45px;
            width: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .logo-link:hover .logo-img {
            transform: scale(1.05);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-yellow);
        }

        .btn-primary {
            background-color: var(--primary-yellow);
            color: #000;
            padding: 10px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* =========================================
           HERO SECTION & CANVAS
           ========================================= */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            margin-bottom: 20px;
            z-index: 2;
        }

        .hero h1 span {
            color: var(--primary-yellow);
        }

        .hero p {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 600px;
            z-index: 2;
            margin-bottom: 40px;
        }

        /* Canvas Background */
        #hero-canvas {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 800px;
            height: auto;
            z-index: 1;
            opacity: 0.3; /* Deixa escuro para destacar o texto */
        }

        /* =========================================
           CHATBOT "FERNANDA"
           ========================================= */
        .chat-widget {
            position: fixed;
            bottom: 30px; right: 30px;
            z-index: 999;
        }

        .chat-btn {
            background: var(--primary-yellow);
            color: #000;
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            border: none;
            transition: transform 0.3s;
        }

        .chat-btn:hover {
            transform: scale(1.1);
        }

        .chat-window {
            display: none;
            position: absolute;
            bottom: 80px; right: 0;
            width: 300px;
            background: var(--dark-gray);
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .chat-header {
            background: #222;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-chat {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }

        .chat-body {
            height: 250px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
            font-size: 0.9rem;
        }

        .msg.fernanda {
            background: #333;
            align-self: flex-start;
        }

        .msg.user {
            background: var(--primary-yellow);
            color: #000;
            align-self: flex-end;
        }

        .chat-footer {
            padding: 10px;
            border-top: 1px solid #333;
            display: flex;
            gap: 5px;
        }

        .chat-footer input {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            background: #111;
            color: #fff;
        }

        .chat-footer button {
            background: var(--primary-yellow);
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* =========================================
           RESPONSIVIDADE
           ========================================= */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .logo-img { max-height: 35px; }
            .chat-window { width: 280px; right: -10px; }
        }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- HEADER COM LOGO -->
    <header class="header">
        <nav class="navbar">
            <a href="#" class="logo-link">
                <!-- AQUI ESTÁ A SUA LOGO -->
                <img src="./logo.png" alt="Logo Araguaia Máquinas" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="#hero">Início</a></li>
                <li><a href="#recursos">Recursos</a></li>
            </ul>
            <a href="https://wa.me/5500000000000" class="btn-primary" target="_blank">Falar com Consultor</a>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero" id="hero">
        <canvas id="hero-canvas"></canvas>
        <h1>Potência e Precisão<br><span>para o seu Agronegócio</span></h1>
        <p>Soluções completas em maquinário pesado com tecnologia de ponta e suporte especializado.</p>
        <a href="#catalogo" class="btn-primary" style="z-index: 2; padding: 15px 30px; font-size: 1.1rem;">Ver Catálogo</a>
    </section>

    <!-- CHATBOT FERNANDA -->
    <div class="chat-widget">
        <button class="chat-btn" id="openChat">💬</button>
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <span>Atendimento Automático</span>
                <button class="close-chat" id="closeChat">X</button>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="msg fernanda">Olá! Eu sou a Fernanda. Como posso ajudar com os equipamentos da Araguaia hoje?</div>
            </div>
            <div class="chat-footer">
                <input type="text" id="chatInput" placeholder="Digite sua dúvida...">
                <button id="sendChat">Enviar</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script>
        // 1. Remover Loader
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 500);
        });

        // 2. Animação Canvas Básica (Fallback para quando não tem imagens no repositório ainda)
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 400;

        function drawFallback() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.05)'; // Forma sutil amarela no fundo
            ctx.beginPath();
            ctx.arc(400, 200, 150 + Math.sin(Date.now() / 500) * 20, 0, Math.PI * 2);
            ctx.fill();
            requestAnimationFrame(drawFallback);
        }
        drawFallback();

        // 3. Lógica do Chatbot Fernanda
        const chatBtn = document.getElementById('openChat');
        const chatWindow = document.getElementById('chatWindow');
        const closeChat = document.getElementById('closeChat');
        const chatInput = document.getElementById('chatInput');
        const sendChat = document.getElementById('sendChat');
        const chatBody = document.getElementById('chatBody');

        chatBtn.addEventListener('click', () => {
            chatWindow.style.display = chatWindow.style.display === 'block' ? 'none' : 'block';
        });

        closeChat.addEventListener('click', () => {
            chatWindow.style.display = 'none';
        });

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', sender);
            msgDiv.textContent = text;
            chatBody.appendChild(msgDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        sendChat.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if(text) {
                addMessage(text, 'user');
                chatInput.value = '';
                
                // Resposta simulada da Fernanda guiando para o WhatsApp
                setTimeout(() => {
                    addMessage("Entendi! Para te passar as especificações técnicas e o orçamento exato, vou te transferir para um especialista no WhatsApp. Clique no botão superior do menu!", 'fernanda');
                }, 1000);
            }
        });

        chatInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendChat.click();
        });
    </script>
</body>
</html>
